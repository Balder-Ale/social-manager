# fly.toml – Social Manager Backend
# Deploy: fly deploy
app = "social-manager2026"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile.fly"

[http_service]
  internal_port = 4001
  force_https = true
  auto_stop_machines = false  # keep warm for demo
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1