version: "4.5"
services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pi
      POSTGRES_PASSWORD: pi
      POSTGRES_DB: pi
    ports: [ "5432:5432" ]
    volumes: [ "pg-data:/var/lib/postgresql/data" ]

  redis:
    image: redis:7-alpine
    ports: [ "6379:6379" ]
    volumes: [ "redis-data:/data" ]

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: [ "9000:9000" ]
    volumes: [ "minio-data:/data" ]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 5s
      retries: 5

  backend:
    build: ./src
    env_file: .env
    depends_on: [ postgres, redis, minio ]
    ports: [ "4001:4001" ]
    environment:
      - PORT=4001
      - DATABASE_URL=postgresql://pi:pi@postgres:5432/pi?schema=public
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=http://minio:9000
    volumes:
      - ./src:/app
      - /app/node_modules
      - ./pi:/pi

#  pi-agent:
#    image: ghcr.io/earendil-works/pi-coding-agent:latest
#    env_file: .env
#    depends_on: [ backend ]
#    ports: [ "4000:4000" ]
#    volumes:
#      - ./pi:/app/pi

  social-mock:
    build:
      context: ./src
      dockerfile: Dockerfile.mock
    env_file: .env
    ports: [ "8080:8080" ]
    depends_on: [ backend ]

volumes:
  pg-data:
  redis-data:
  minio-data:
